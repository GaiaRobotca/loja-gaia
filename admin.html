<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Loja GAIA</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .admin-container { max-width: 900px; margin: 40px auto; padding: 20px; background: var(--bg-surface); border-radius: 8px; border: 1px solid var(--border); }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 5px; color: var(--text-faint); font-size: 0.9rem;}
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; background: var(--bg-base); border: 1px solid var(--border); color: white; border-radius: 4px; font-family: var(--f-body); }
    .form-group input[type="checkbox"] { width: auto; display: inline-block; margin-right: 10px; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; background: var(--bg-base); border-radius: 6px; overflow: hidden; }
    th, td { text-align: left; padding: 12px; border-bottom: 1px solid var(--border); }
    th { color: var(--text-faint); font-family: var(--f-mono); font-size: 0.8rem; text-transform: uppercase; background: rgba(0,0,0,0.2); }
    td img { width: 50px; height: 50px; object-fit: cover; border-radius: 4px; }
    .table-actions { display: flex; gap: 8px; }
    .table-actions button { background: none; border: 1px solid var(--border); color: white; padding: 5px 10px; cursor: pointer; border-radius: 4px; font-size: 0.85rem; }
    .table-actions button:hover { background: var(--bg-surface-hover); }
    .table-actions button.danger { color: var(--danger); border-color: var(--danger); }
    .table-actions button.danger:hover { background: rgba(255, 76, 76, 0.1); }
    .variant-editor-row { display: flex; gap: 10px; align-items: center; margin-bottom: 8px; }
    .variant-editor-row input { padding: 6px; background: var(--bg-base); border: 1px solid var(--border); color: white; border-radius: 4px; }
    .variant-editor-row button { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 1.1rem; padding: 0 5px; }
    .status-pill { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; }
    .status-pill.on { background: rgba(76, 255, 179, 0.2); color: var(--accent-green); }
    .status-pill.off { background: rgba(255, 76, 76, 0.2); color: var(--danger); }
    .form-error { color: var(--danger); font-weight: bold; margin-top: 10px; }
    .form-success { color: var(--accent-green); font-weight: bold; margin-top: 10px; }
  </style>
</head>
<body>

  <div id="login-screen" class="admin-container" style="display:grid; place-items:center; min-height: 250px; margin-top: 100px;">
    <form id="login-form" style="width: 100%; max-width: 320px; text-align: center; padding: 20px 0;">
      <h2 style="margin-bottom: 24px; font-family: var(--f-display);">Painel GAIA Admin</h2>
      <div class="form-group">
        <input type="email" id="login-email" placeholder="E-mail do Administrador" required>
      </div>
      <div class="form-group">
        <input type="password" id="login-senha" placeholder="Senha" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 10px;">Entrar</button>
      <p id="login-error" style="color: var(--danger); margin-top: 15px; font-size: 0.85rem;"></p>
    </form>
  </div>

  <div id="denied-screen" class="admin-container" style="display:none; text-align:center; margin-top: 100px;">
    <h2 style="color: var(--danger);">Acesso Negado</h2>
    <p style="margin: 15px 0; color: var(--text-faint);">O e-mail <strong id="denied-email" style="color:white;"></strong> não está na lista de administradores autorizados.</p>
    <button id="denied-logout-btn" class="btn btn-ghost">Fazer Logout</button>
  </div>

  <div id="admin-app" class="admin-container" style="display:none;">
    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px;">
      <h2 style="font-family: var(--f-display);">Gestão da Loja GAIA</h2>
      <div style="display: flex; align-items: center; gap: 15px;">
        <span id="admin-email" style="color: var(--text-faint); font-size: 0.9rem; font-family: var(--f-mono);"></span>
        <button id="logout-btn" class="btn btn-ghost" style="padding: 6px 12px; font-size: 0.85rem;">Sair</button>
      </div>
    </div>

    <form id="product-form" style="background: rgba(0,0,0,0.15); padding: 20px; border-radius: 6px; margin-bottom: 40px; border: 1px solid var(--border);">
      <h3 id="form-title" style="margin-bottom: 20px; font-family: var(--f-display); color: var(--accent-green);">Novo Produto</h3>
      
      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;">
        <div class="form-group">
          <label for="f-nome">Nome do Produto</label>
          <input type="text" id="f-nome" required placeholder="Ex: Camiseta EletroQuad 2026">
        </div>
        <div class="form-group">
          <label for="f-categoria">Categoria</label>
          <select id="f-categoria">
            <option value="kit">Kits</option>
            <option value="camiseta">Camisetas</option>
            <option value="chaveiro">Chaveiros</option>
            <option value="outro">Outros</option>
          </select>
        </div>
        <div class="form-group">
          <label for="f-preco">Preço (R$)</label>
          <input type="text" id="f-preco" required placeholder="Ex: 49,90">
        </div>
        <div class="form-group">
          <label for="f-imagem-url">URL da Imagem (Opcional)</label>
          <input type="url" id="f-imagem-url" placeholder="https://...">
        </div>
      </div>
      
      <div class="form-group" style="margin-top: 10px;">
        <label for="f-imagem-arquivo">Ou Upload de Foto (Direto pro Firebase Storage)</label>
        <input type="file" id="f-imagem-arquivo" accept="image/*" style="border: none; background: transparent; padding: 5px 0;">
      </div>

      <div class="form-group">
        <label for="f-descricao">Descrição do Produto</label>
        <textarea id="f-descricao" rows="3" placeholder="Detalhes sobre o produto, material, o que vem no kit..."></textarea>
      </div>
      
      <div class="form-group" style="display: flex; align-items: center; margin: 20px 0;">
        <input type="checkbox" id="f-has-variantes">
        <label for="f-has-variantes" style="cursor:pointer; font-weight: 500;">Este produto possui variações/tamanhos? (Ex: P, M, G)</label>
      </div>

      <div id="estoque-field" class="form-group">
        <label for="f-estoque">Quantidade em Estoque</label>
        <input type="number" id="f-estoque" min="0" value="0" style="max-width: 150px;">
      </div>
      
      <div id="variantes-field" style="display: none; background: var(--bg-surface-hover); padding: 20px; border-radius: 6px; margin-bottom: 20px; border: 1px solid var(--border);">
        <label style="color: var(--accent-blue); font-weight: bold; margin-bottom: 12px; display:block; font-family: var(--f-display);">Tamanhos & Estoque por Tamanho</label>
        <div id="variant-editor" style="margin-bottom: 15px;"></div>
        <button type="button" id="add-variant-btn" class="btn btn-ghost" style="padding: 6px 12px; font-size: 0.8rem;">+ Adicionar Tamanho</button>
      </div>

      <div class="form-group" style="display: flex; align-items: center; margin-bottom: 20px;">
        <input type="checkbox" id="f-ativo" checked>
        <label for="f-ativo" style="cursor:pointer; color: var(--text-faint);">Produto Ativo (Fica visível imediatamente na vitrine da loja)</label>
      </div>

      <div style="display: flex; gap: 12px; align-items: center; border-top: 1px solid var(--border); padding-top: 20px;">
        <button type="submit" id="save-btn" class="btn btn-primary">Salvar Produto</button>
        <button type="button" id="cancel-edit-btn" class="btn btn-ghost" style="display:none;">Cancelar Edição</button>
        <span id="form-status"></span>
      </div>
    </form>

    <h3 style="font-family: var(--f-display); margin-bottom: 15px;">Catálogo Atual</h3>
    <div style="overflow-x: auto;">
      <table>
        <thead>
          <tr>
            <th>Foto</th>
            <th>Produto / Categoria</th>
            <th>Preço</th>
            <th>Estoque</th>
            <th>Status</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="product-table-body">
          <tr><td colspan="6">Carregando catálogo do Firebase...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script type="module" src="js/admin.js"></script>
</body>
</html>
